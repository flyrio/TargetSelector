name: Sync Plugin Sources

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/sync-plugin-sources.yml"
      - "scripts/**"

permissions:
  contents: write

concurrency:
  group: sync-plugin-sources
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Sync upstream plugin metadata
        run: python scripts/sync_plugin_sources.py

      - name: Commit and push changes
        run: |
          if git diff --quiet -- TargetSelector.json; then
            echo "No TargetSelector.json changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add TargetSelector.json
          git commit -m "Auto-sync plugin metadata"
          git fetch origin main
          git rebase origin/main
          git push origin HEAD:main
